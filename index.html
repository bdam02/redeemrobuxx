<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Robux</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial, sans-serif;
color:white;
}

.card{
background:#111827;
padding:50px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
text-align:center;
width:90%;
max-width:500px;
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{
font-size:36px;
margin-bottom:30px;
}

button{
background:#22c55e;
border:none;
padding:16px 40px;
font-size:20px;
border-radius:12px;
cursor:pointer;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#16a34a;
}

#loading{
display:none;
margin-top:25px;
font-size:18px;
color:#cbd5f5;
}

#error{
margin-top:25px;
font-size:20px;
color:#ff4d4d;
}

</style>

</head>

<body>

<div class="card">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Robux_2019_Logo.png">

<h1>FREE ROBUX</h1>

<button onclick="redeem()">REDEEM</button>

<div id="loading">Connecting to servers...</div>
<div id="error"></div>

</div>

<script>

function redeem(){

document.getElementById("loading").style.display="block";
document.getElementById("error").innerText="";

setTimeout(function(){

document.getElementById("loading").style.display="none";
document.getElementById("error").innerText =
"❌ Error: Free Robux generators do not exist.";

},3000);

}

</script>

</body>
</html>
