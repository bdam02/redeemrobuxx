<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redeem Code</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial, sans-serif;
color:white;
}

.card{
background:#111827;
padding:50px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
width:90%;
max-width:500px;
}

.logo{
font-size:40px;
font-weight:bold;
color:#22c55e;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

button{
margin-top:20px;
background:#22c55e;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
color:white;
transition:0.2s;
}

button:hover{
background:#16a34a;
transform:scale(1.05);
}

#loading{
display:none;
margin-top:20px;
color:#cbd5f5;
}

#error{
margin-top:20px;
color:#ff4d4d;
font-size:18px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">ROBUX</div>

<h2>Redeem Your Code</h2>

<input id="code" placeholder="Enter your code">

<button onclick="redeem()">Redeem</button>

<div id="loading">Checking code...</div>
<div id="error"></div>

</div>

<script>

function redeem(){

document.getElementById("loading").style.display="block";
document.getElementById("error").innerText="";

setTimeout(function(){

document.getElementById("loading").style.display="none";
document.getElementById("error").innerText =
"❌ Error: This code is invalid.";

},3000);

}

</script>

</body>
</html>
